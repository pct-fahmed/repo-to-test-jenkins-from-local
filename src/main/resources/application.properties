spring.application.name=repo-to-test-jenkins-from-local
server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/dvz_demo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dvz}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dvz}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml

vaadin.launch-browser=false
vaadin.frontend.hotdeploy=true
vaadin.copilot.enable=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
